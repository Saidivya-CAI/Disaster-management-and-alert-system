spring.application.name=demo

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/disaster_management
spring.datasource.username=root
spring.datasource.password=Divyamani@2724
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# WebSocket support
spring.main.allow-bean-definition-overriding=true

# Disable Redis auto-configuration (Redis not running locally)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# Scheduling
spring.task.scheduling.pool.size=5

# ── External Disaster APIs ──────────────────────────────────────
# USGS Earthquake Feed (free, no key required)
external.api.usgs-url=https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson

# NASA EONET (free, no key required)
external.api.nasa-eonet-url=https://eonet.gsfc.nasa.gov/api/v3/events

# OpenWeatherMap One Call API (requires free API key from https://openweathermap.org/api)
external.api.open-weather-key=YOUR_OPENWEATHERMAP_API_KEY_HERE
external.api.open-weather-url=https://api.openweathermap.org/data/2.5/weather
external.api.open-weather-lat=20.5937
external.api.open-weather-lon=78.9629
+
+# Increase request and upload size for Base64 situational images
+server.tomcat.max-http-post-size=100MB
+spring.servlet.multipart.max-file-size=50MB
+spring.servlet.multipart.max-request-size=50MB
+spring.codec.max-in-memory-size=50MB
